apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient
  template:
    metadata:
      labels:
        app: patient
    spec:
      containers:
        - name: patient
          image: smart/patient-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: smart-config
                  key: JWT_SECRET
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: smart-secrets
                  key: MONGO_URI_PATIENT   # ✅ fixed (separate DB like others)
            - name: DOCTOR_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-config
                  key: DOCTOR_URL
            - name: APPOINTMENT_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-config
                  key: APPOINTMENT_URL   # ✅ added (commonly needed)
            - name: NOTIFICATION_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-config
                  key: NOTIFICATION_URL  # ✅ added (if sending emails/alerts)

---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
spec:
  selector:
    app: patient
  ports:
    - port: 4002
      targetPort: 4002